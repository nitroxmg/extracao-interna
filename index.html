<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Extração Interna — Dias & Oliveira Advogados</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --cream: #F5F2EC;
  --dark: #1A1A18;
  --green: #1D9E75;
  --green-dark: #0F6E56;
  --green-light: #E1F5EE;
  --muted: #7A7A72;
  --border: rgba(26,26,24,0.12);
  --border-strong: rgba(26,26,24,0.25);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--dark); min-height: 100vh; display: flex; flex-direction: column; }
header { padding: 1.5rem 2rem; display: flex; align-items: center; justify-content: space-between; border-bottom: 0.5px solid var(--border); position: sticky; top: 0; background: var(--cream); z-index: 10; }
.logo { font-family: 'Playfair Display', serif; font-size: 1.1rem; font-weight: 500; letter-spacing: 0.04em; color: var(--dark); text-transform: uppercase; }
.logo span { color: var(--green); }
.header-info { font-size: 12px; color: var(--muted); font-weight: 300; letter-spacing: 0.05em; text-transform: uppercase; }
.progress-wrap { padding: 1.5rem 2rem 0; max-width: 780px; margin: 0 auto; width: 100%; }
.progress-track { height: 2px; background: var(--border); border-radius: 99px; margin-bottom: 0.6rem; }
.progress-fill { height: 2px; background: var(--green); border-radius: 99px; transition: width 0.5s cubic-bezier(0.4,0,0.2,1); }
.progress-meta { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 1rem; }
.dots-row { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 2rem; }
.dot { width: 7px; height: 7px; border-radius: 50%; background: var(--border-strong); cursor: pointer; transition: all 0.2s; }
.dot.done { background: var(--green); opacity: 0.5; }
.dot.current { background: var(--green); transform: scale(1.4); opacity: 1; }
main { flex: 1; display: flex; align-items: flex-start; justify-content: center; padding: 0 2rem 4rem; }
.card { max-width: 680px; width: 100%; animation: fadeUp 0.35s cubic-bezier(0.4,0,0.2,1); }
@keyframes fadeUp { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }
.section-label { display: inline-block; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--green-dark); border: 0.5px solid var(--green); padding: 4px 12px; border-radius: 99px; margin-bottom: 1.4rem; font-weight: 500; }
.q-number { font-size: 11px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 0.6rem; }
.q-text { font-family: 'Playfair Display', serif; font-size: clamp(1.4rem, 3vw, 2rem); font-weight: 500; line-height: 1.3; color: var(--dark); margin-bottom: 0.8rem; }
.q-hint { font-size: 14px; color: var(--muted); line-height: 1.7; margin-bottom: 2rem; font-weight: 300; max-width: 520px; }
textarea { width: 100%; border: 0.5px solid var(--border-strong); border-radius: 4px; padding: 1rem 1.2rem; font-size: 15px; font-family: 'DM Sans', sans-serif; font-weight: 300; color: var(--dark); background: #fff; resize: vertical; min-height: 130px; line-height: 1.7; transition: border-color 0.2s, box-shadow 0.2s; outline: none; }
textarea:focus { border-color: var(--green); box-shadow: 0 0 0 3px rgba(29,158,117,0.1); }
textarea::placeholder { color: #b5b3aa; }
.tags-wrap { width: 100%; border: 0.5px solid var(--border-strong); border-radius: 4px; padding: 10px 12px; background: #fff; display: flex; flex-wrap: wrap; gap: 7px; cursor: text; min-height: 52px; transition: border-color 0.2s, box-shadow 0.2s; }
.tags-wrap:focus-within { border-color: var(--green); box-shadow: 0 0 0 3px rgba(29,158,117,0.1); }
.tag { background: var(--green-light); color: var(--green-dark); border-radius: 99px; padding: 4px 12px; font-size: 13px; font-weight: 500; display: flex; align-items: center; gap: 7px; }
.tag-x { cursor: pointer; font-size: 16px; line-height: 1; opacity: 0.6; }
.tag-x:hover { opacity: 1; }
.tags-wrap input { border: none; outline: none; font-size: 14px; font-family: 'DM Sans', sans-serif; background: transparent; color: var(--dark); flex: 1; min-width: 140px; font-weight: 300; }
.tags-hint { font-size: 11px; color: var(--muted); margin-top: 6px; }
.scale-container { margin: 0.5rem 0; }
.scale-labels { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-bottom: 10px; font-weight: 300; }
.scale-btns { display: flex; gap: 10px; }
.scale-btn { flex: 1; border: 0.5px solid var(--border-strong); border-radius: 4px; padding: 14px 8px; font-size: 16px; font-family: 'Playfair Display', serif; cursor: pointer; background: #fff; color: var(--muted); transition: all 0.15s; text-align: center; }
.scale-btn:hover { border-color: var(--green); color: var(--green-dark); }
.scale-btn.active { background: var(--green-light); border-color: var(--green); color: var(--green-dark); font-weight: 500; }
.btn-row { display: flex; align-items: center; gap: 10px; margin-top: 2rem; }
.btn-next { background: var(--dark); color: var(--cream); border: none; border-radius: 4px; padding: 13px 30px; font-size: 13px; font-family: 'DM Sans', sans-serif; font-weight: 500; cursor: pointer; letter-spacing: 0.06em; text-transform: uppercase; transition: background 0.15s, transform 0.1s; }
.btn-next:hover { background: var(--green-dark); }
.btn-next:active { transform: scale(0.98); }
.btn-skip { background: transparent; color: var(--muted); border: 0.5px solid var(--border-strong); border-radius: 4px; padding: 13px 20px; font-size: 12px; font-family: 'DM Sans', sans-serif; cursor: pointer; letter-spacing: 0.05em; text-transform: uppercase; transition: all 0.15s; }
.btn-skip:hover { color: var(--dark); border-color: var(--dark); }
.btn-back { background: transparent; color: var(--muted); border: none; font-size: 12px; font-family: 'DM Sans', sans-serif; cursor: pointer; letter-spacing: 0.05em; text-transform: uppercase; padding: 13px 4px; transition: color 0.15s; }
.btn-back:hover { color: var(--dark); }
.spacer { flex: 1; }
.summary-title { font-family: 'Playfair Display', serif; font-size: 2rem; font-weight: 500; margin-bottom: 0.5rem; }
.summary-sub { font-size: 14px; color: var(--muted); font-weight: 300; margin-bottom: 2rem; }
.summary-section { margin-bottom: 2rem; }
.summary-sec-title { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--green-dark); font-weight: 500; border-bottom: 0.5px solid var(--green); padding-bottom: 6px; margin-bottom: 1rem; }
.summary-item { display: grid; grid-template-columns: 220px 1fr; gap: 16px; padding: 10px 0; border-bottom: 0.5px solid var(--border); }
.summary-q { font-size: 12px; color: var(--muted); font-weight: 300; line-height: 1.5; }
.summary-a { font-size: 13px; color: var(--dark); line-height: 1.6; }
.send-box { border: 0.5px solid var(--border-strong); border-radius: 4px; padding: 1.5rem; background: #fff; margin-top: 2.5rem; }
.send-box-title { font-size: 13px; font-weight: 500; margin-bottom: 0.3rem; }
.send-box-sub { font-size: 12px; color: var(--muted); margin-bottom: 1rem; font-weight: 300; }
.email-input { width: 100%; border: 0.5px solid var(--border-strong); border-radius: 4px; padding: 10px 14px; font-size: 14px; font-family: 'DM Sans', sans-serif; color: var(--dark); background: var(--cream); outline: none; margin-bottom: 10px; }
.email-input:focus { border-color: var(--green); }
.action-row { display: flex; gap: 10px; flex-wrap: wrap; }
.btn-send { background: var(--dark); color: var(--cream); border: none; border-radius: 4px; padding: 13px 28px; font-size: 12px; font-family: 'DM Sans', sans-serif; font-weight: 500; cursor: pointer; letter-spacing: 0.06em; text-transform: uppercase; transition: background 0.15s; }
.btn-send:hover { background: var(--green-dark); }
.btn-copy { background: var(--dark); color: var(--cream); border: none; border-radius: 4px; padding: 13px 28px; font-size: 12px; font-family: 'DM Sans', sans-serif; font-weight: 500; cursor: pointer; letter-spacing: 0.06em; text-transform: uppercase; transition: background 0.15s; }
.btn-copy:hover { background: var(--green-dark); }
.btn-restart { background: transparent; border: 0.5px solid var(--border-strong); color: var(--muted); border-radius: 4px; padding: 13px 20px; font-size: 12px; font-family: 'DM Sans', sans-serif; cursor: pointer; letter-spacing: 0.05em; text-transform: uppercase; transition: all 0.15s; }
.btn-restart:hover { color: var(--dark); border-color: var(--dark); }
.status-msg { margin-top: 10px; font-size: 13px; }
@media (max-width: 600px) {
  header { padding: 1rem; }
  main { padding: 0 1rem 3rem; }
  .progress-wrap { padding: 1rem 1rem 0; }
  .summary-item { grid-template-columns: 1fr; gap: 4px; }
  .scale-btns { gap: 6px; }
}
</style>
</head>
<body>
<header>
  <div class="logo">Dias &amp; Oliveira <span>Advogados</span></div>
  <div class="header-info">Extração Interna · 2025</div>
</header>
<div class="progress-wrap" id="pwrap">
  <div class="progress-track"><div class="progress-fill" id="pbar" style="width:2%"></div></div>

  <div class="dots-row" id="dots"></div>

<main><div class="card" id="card"></div></main>
<script>
var Q = [
  {s:"Nossa história",q:"Qual é a nossa história?",h:"Como a empresa surgiu? Qual foi o momento de virada? O que motivou o início?",t:"textarea"},
  {s:"Nossa história",q:"Como chegamos até aqui?",h:"Quais foram os marcos mais importantes da trajetória?",t:"textarea"},
  {s:"Situação atual",q:"Como o negócio está atualmente?",h:"Descreva a estrutura atual: produtos, serviços, canais, receita, equipe.",t:"textarea"},
  {s:"Expectativas",q:"Sobre posicionamento: qual espaço ocupar?",h:"Qual mensagem transmitir? Qual a percepção de marca que querem construir?",t:"textarea"},
  {s:"Expectativas",q:"Conclusão de sucesso",h:"Se pudéssemos dar um salto para o fim do projeto, quais perguntas seriam respondidas?",t:"textarea"},
  {s:"Expectativas",q:"O que não pode dar errado?",h:"Imagine que o final do projeto foi um desastre. O que nos levou a fracassar?",t:"textarea"},
  {s:"Pontos-chave",q:"O que você faz?",h:"Descreva o negócio de forma simples e direta.",t:"textarea"},
  {s:"Pontos-chave",q:"Quem você ajuda?",h:"Qual é o público que se beneficia do seu trabalho?",t:"textarea"},
  {s:"Pontos-chave",q:"Qual é o seu diferencial?",h:"O que nenhum concorrente pode copiar facilmente?",t:"textarea"},
  {s:"Persona ideal",q:"Qual é o problema atual da persona ideal?",h:"O que ela está enfrentando e buscando solução?",t:"textarea"},
  {s:"Persona ideal",q:"Contexto demográfico da persona ideal",h:"Localização / Faixa etária / Estágio de vida / Sexo / Formação",t:"textarea"},
  {s:"Persona ideal",q:"Como é a rotina da persona ideal?",h:"Seus hábitos, vícios, como ela passa o dia.",t:"textarea"},
  {s:"Persona ideal",q:"Valores e crenças da persona ideal",h:"O que ela defende e ninguém muda de ideia? Ela tem religião?",t:"textarea"},
  {s:"Persona ideal",q:"Quais são as fraquezas da persona ideal?",h:"O que impede ela de progredir?",t:"textarea"},
  {s:"Persona ideal",q:"Qual é o sucesso da persona ideal?",h:"Quais metas e ambições essa pessoa carrega?",t:"textarea"},
  {s:"Persona indesejada",q:"Qual é o problema atual da persona indesejada?",h:"O que ela está enfrentando e buscando solução?",t:"textarea"},
  {s:"Persona indesejada",q:"Contexto demográfico da persona indesejada",h:"Localização / Faixa etária / Estágio de vida / Sexo / Formação",t:"textarea"},
  {s:"Persona indesejada",q:"Como é a rotina da persona indesejada?",h:"Seus hábitos, vícios, como ela passa o dia.",t:"textarea"},
  {s:"Persona indesejada",q:"Valores e crenças da persona indesejada",h:"O que ela defende e ninguém muda de ideia? Ela tem religião?",t:"textarea"},
  {s:"Persona indesejada",q:"Quais são as fraquezas da persona indesejada?",h:"O que impede ela de progredir?",t:"textarea"},
  {s:"Persona indesejada",q:"Qual é o sucesso da persona indesejada?",h:"Quais metas e ambições essa pessoa carrega?",t:"textarea"},

  {s:"Concorrentes",q:"Quem são os concorrentes de segmento?",h:"Nível 2 — atuam no mesmo segmento mas com abordagem diferente.",t:"textarea"},
  {s:"Concorrentes",q:"Quem são os concorrentes indiretos?",h:"Níveis 3 e 4 — substituem a solução de forma indireta.",t:"textarea"},
  {s:"Manifesto",q:"Estamos vivendo um momento em que...",h:"Situação do mundo que exige atenção ou mudança.",t:"textarea"},
  {s:"Manifesto",q:"Somos movidos pela convicção de que...",h:"Declaração de crença profunda, não negociável.",t:"textarea"},
  {s:"Manifesto",q:"Por isso, existimos para...",h:"Público + propósito transformador.",t:"textarea"},
  {s:"Manifesto",q:"Fazemos isso oferecendo...",h:"Solução clara, com proposta de valor prática e simbólica.",t:"textarea"},
  {s:"Manifesto",q:"De um jeito que...",h:"Diferencial em relação ao mercado — como fazem diferente.",t:"textarea"},
  {s:"Manifesto",q:"Porque acreditamos que, ao longo do tempo...",h:"Visão de impacto, legado ou transformação.",t:"textarea"},
  {s:"Manifesto",q:"Outra empresa poderia dizer o mesmo?",h:"O que torna essa crença única para vocês?",t:"textarea"},
  {s:"Manifesto",q:"Quais são as bandeiras da marca?",h:"Aquilo que a marca defende ativamente. Digite e pressione Enter.",t:"tags"},
  {s:"Manifesto",q:"Quais são as descrenças da marca?",h:"Aquilo que a marca repudia. Digite e pressione Enter.",t:"tags"},
  {s:"Nuvem verbal",q:"Palavras-chave que representam a marca",h:"Palavras soltas que vêm à mente. Digite e pressione Enter.",t:"tags"},
  {s:"Nuvem verbal",q:"Expressões marcantes da marca",h:"Frases, slogans, bordões. Digite e pressione Enter.",t:"tags"},
  {s:"Nuvem verbal",q:"Símbolos associados à marca",h:"Ícones, formas, elementos visuais. Digite e pressione Enter.",t:"tags"},
  {s:"Atributos",q:"Séria ou Divertida?",h:"The New York Times = muito séria | Disney+ = muito divertida",t:"scale",l:"Séria",r:"Divertida"},
  {s:"Atributos",q:"Feminina ou Masculina?",h:"Dove = muito feminina | Gillette = muito masculina",t:"scale",l:"Feminina",r:"Masculina"},
  {s:"Atributos",q:"Jovem ou Madura?",h:"TikTok = muito jovem | BBC = muito madura",t:"scale",l:"Jovem",r:"Madura"},
  {s:"Atributos",q:"Técnica ou Intuitiva?",h:"Adobe = muito técnica | Apple = muito intuitiva",t:"scale",l:"Técnica",r:"Intuitiva"},
  {s:"Atributos",q:"Rebelde ou Disciplinada?",h:"Vans = rebelde | IBM = disciplinada",t:"scale",l:"Rebelde",r:"Disciplinada"},
  {s:"Atributos",q:"Luxuosa ou Popular?",h:"Louis Vuitton = luxuosa | Netflix = popular",t:"scale",l:"Luxuosa",r:"Popular"},
  {s:"Atributos",q:"Artesanal ou Industrial?",h:"Montblanc = artesanal | Ford = industrial",t:"scale",l:"Artesanal",r:"Industrial"},
  {s:"Atributos",q:"Delicada ou Robusta?",h:"L'Occitane = delicada | Jeep = robusta",t:"scale",l:"Delicada",r:"Robusta"},
  {s:"Atributos",q:"Corporativa ou Descontraída?",h:"Safra = corporativa | Red Bull = descontraída",t:"scale",l:"Corporativa",r:"Descontraída"},
  {s:"Atributos",q:"Tradicional ou Moderna?",h:"Rolex = tradicional | Tesla = moderna",t:"scale",l:"Tradicional",r:"Moderna"},
  {s:"Arquitetura sensorial",q:"Visão — fotografia, cores e símbolos",h:"Que tipo de imagem representa a marca? Que paleta? Que formas?",t:"textarea"},
  {s:"Arquitetura sensorial",q:"Visão — vestimenta e ambientes",h:"Como as pessoas associadas à marca se vestem? Que espaço ela habita?",t:"textarea"},
  {s:"Arquitetura sensorial",q:"Audição — sons e estilo musical",h:"Que tipo de música toca nos ambientes da marca?",t:"textarea"},
  {s:"Arquitetura sensorial",q:"Tato — objetos, hábitos e hobbies",h:"Que texturas, materiais e objetos representam a marca?",t:"textarea"},
  {s:"Arquitetura sensorial",q:"Paladar — sabores associados à marca",h:"Se a marca fosse uma comida ou bebida, o que seria?",t:"textarea"},
  {s:"Arquitetura sensorial",q:"Olfato — cheiros associados à marca",h:"Se a marca tivesse um perfume, como seria?",t:"textarea"},
  {s:"Pontos de contato",q:"Em quais canais a marca está presente?",h:"Site, YouTube, Instagram, espaço físico, outros. Digite e pressione Enter.",t:"tags"},
  {s:"Pontos de contato",q:"Há algum ponto de contato a ser criado?",h:"Canais novos que fazem sentido para o público e produto.",t:"textarea"},
  {s:"Projeção de futuro",q:"Como o negócio está hoje (2025)?",h:"Receita, equipe, produtos ativos, posição no mercado.",t:"textarea"},
  {s:"Projeção de futuro",q:"Onde quer estar em 1 ano (2026)?",h:"Quais metas e indicadores seriam um sucesso?",t:"textarea"},
  {s:"Projeção de futuro",q:"Onde quer estar em 2 anos (2027)?",h:"Expansão, novos produtos, novos mercados?",t:"textarea"},
  {s:"Projeção de futuro",q:"Onde quer estar em 5 anos (2030)?",h:"Qual é o legado? Qual impacto querem ter?",t:"textarea"},
  {s:"Identidade visual",q:"Quais cores você gosta e por quê?",h:"Pode ser cores específicas, paletas, referências visuais de marcas que admira.",t:"textarea"},
  {s:"Identidade visual",q:"Quais cores você não gosta de forma alguma?",h:"Cores que definitivamente não podem aparecer na marca.",t:"textarea"},
  {s:"Identidade visual",q:"Quer um símbolo mais minimalista ou mais detalhado?",h:"Tem que ter algo que remete à advocacia ou prefere algo mais subjetivo e abstrato?",t:"textarea"},
  {s:"Identidade visual",q:"Você gosta de fontes mais finas, mais curvadas ou mais informais?",h:"Exemplos: serifada clássica, sans-serif moderna, script manuscrita. Pense em marcas que você admira.",t:"textarea"},
  {s:"Identidade visual",q:"Quer um símbolo que remeta à inicial do seu nome ou algo que remeta à justiça?",h:"Ou algo totalmente diferente? Aberto a outras referências?",t:"textarea"},
  {s:"Identidade visual",q:"Uma marca mais tipográfica ou mais acessível com símbolo?",h:"Tipográfica = só o nome bem trabalhado. Com símbolo = ícone + nome juntos.",t:"textarea"},
  {s:"Identidade visual",q:"Você gosta de ter um símbolo ou não faz diferença?",h:"Algumas marcas funcionam perfeitamente só com tipografia. Tem preferência?",t:"textarea"},
  {s:"Identidade visual",q:"Você é mais acessível ou mais caro?",h:"Isso ajuda a definir o posicionamento visual — marcas populares vs. marcas premium têm estéticas diferentes.",t:"textarea"}
];

var cur = 0;
var ans = new Array(Q.length).fill(null);
var tagData = {};

function pct() { return Math.max(2, Math.round((cur / Q.length) * 100)); }

function renderDots() {
  var d = document.getElementById('dots');
  d.innerHTML = '';
  for (var i = 0; i < Q.length; i++) {
    var dot = document.createElement('div');
    var cls = 'dot';
    if (i < cur) cls += ' done';
    if (i === cur) cls += ' current';
    dot.className = cls;
    dot.title = Q[i].q.substring(0, 50);
    (function(idx) {
      dot.onclick = function() { if (idx <= cur) { cur = idx; render(); } };
    })(i);
    d.appendChild(dot);
  }
}

function updateProgress() {
  document.getElementById('pbar').style.width = pct() + '%';
  document.getElementById('plabel').textContent = 'Pergunta ' + (cur + 1) + ' de ' + Q.length;
  document.getElementById('psec').textContent = Q[cur].s;
}

function hydrateTagsWrap(idx) {
  var wrap = document.getElementById('tw_' + idx);
  if (!wrap) return;
  if (!tagData[idx]) tagData[idx] = (ans[idx] && Array.isArray(ans[idx])) ? ans[idx].slice() : [];
  function redraw() {
    var tags = tagData[idx];
    var html = '';
    for (var i = 0; i < tags.length; i++) {
      html += '<span class="tag">' + tags[i] + '<span class="tag-x" data-i="' + i + '">x</span></span>';
    }
    html += '<input type="text" placeholder="Digite e pressione Enter...">';
    wrap.innerHTML = html;
    var inp = wrap.querySelector('input');
    inp.addEventListener('keydown', function(e) {
      if ((e.key === 'Enter' || e.key === ',') && inp.value.trim()) {
        e.preventDefault();
        tagData[idx].push(inp.value.trim());
        redraw();
      } else if (e.key === 'Backspace' && !inp.value && tagData[idx].length) {
        tagData[idx].pop();
        redraw();
      }
    });
    wrap.querySelectorAll('.tag-x').forEach(function(x) {
      x.addEventListener('click', function() {
        tagData[idx].splice(parseInt(x.dataset.i), 1);
        redraw();
      });
    });
    wrap.addEventListener('click', function() { inp.focus(); });
    inp.focus();
  }
  redraw();
}

function render() {
  if (cur >= Q.length) { renderSummary(); return; }
  var q = Q[cur];
  updateProgress();
  renderDots();
  var inputHTML = '';
  if (q.t === 'textarea') {
    inputHTML = '<textarea id="mi" placeholder="Escreva a resposta aqui...">' + (ans[cur] || '') + '</textarea>';
  } else if (q.t === 'tags') {
    inputHTML = '<div class="tags-wrap" id="tw_' + cur + '"></div><div class="tags-hint">Pressione Enter após cada item</div>';
  } else if (q.t === 'scale') {
    var a = ans[cur];
    inputHTML = '<div class="scale-container"><div class="scale-labels"><span>' + q.l + '</span><span>' + q.r + '</span></div><div class="scale-btns">';
    for (var v = 1; v <= 5; v++) {
      inputHTML += '<button class="scale-btn' + (a == v ? ' active' : '') + '" data-v="' + v + '">' + v + '</button>';
    }
    inputHTML += '</div></div>';
  }
  var backBtn = cur > 0 ? '<button class="btn-back" id="bb">← Voltar</button>' : '';
  var finalBtn = cur === Q.length - 1 ? 'Finalizar' : 'Próxima →';
  document.getElementById('card').innerHTML =
    '<div class="section-label">' + q.s + '</div>' +
    '<div class="q-number">Pergunta ' + (cur + 1) + ' · ' + q.s + '</div>' +
    '<div class="q-text">' + q.q + '</div>' +
    '<div class="q-hint">' + q.h + '</div>' +
    inputHTML +
    '<div class="btn-row">' + backBtn + '<div class="spacer"></div>' +
    '<button class="btn-skip" id="bs">Pular</button>' +
    '<button class="btn-next" id="bn">' + finalBtn + '</button></div>';

  if (q.t === 'tags') hydrateTagsWrap(cur);

  if (q.t === 'scale') {
    document.querySelectorAll('.scale-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        ans[cur] = parseInt(btn.dataset.v);
        document.querySelectorAll('.scale-btn').forEach(function(b) { b.classList.remove('active'); });
        btn.classList.add('active');
      });
    });
  }

  function saveAndGo() {
    if (q.t === 'textarea') {
      var v = document.getElementById('mi').value.trim();
      ans[cur] = v || null;
    } else if (q.t === 'tags') {
      ans[cur] = (tagData[cur] && tagData[cur].length) ? tagData[cur].slice() : null;
    }
    cur++;
    render();
  }

  document.getElementById('bn').addEventListener('click', saveAndGo);
  document.getElementById('bs').addEventListener('click', function() { saveAndGo(); });
  var bb = document.getElementById('bb');
  if (bb) bb.addEventListener('click', function() { cur--; render(); });
}

function buildText() {
  var secs = [];
  Q.forEach(function(q) { if (secs.indexOf(q.s) === -1) secs.push(q.s); });
  var txt = 'EXTRAÇÃO INTERNA — DIAS & OLIVEIRA ADVOGADOS\n';
  txt += 'Data: ' + new Date().toLocaleDateString('pt-BR') + '\n';
  txt += '='.repeat(40) + '\n\n';
  secs.forEach(function(sec) {
    var items = [];
    Q.forEach(function(q, i) { if (q.s === sec && ans[i] !== null && ans[i] !== undefined) items.push({q:q, i:i}); });
    if (!items.length) return;
    txt += '\n[ ' + sec.toUpperCase() + ' ]\n\n';
    items.forEach(function(item) {
      var a = ans[item.i];
      txt += item.q.q + '\n' + (Array.isArray(a) ? a.join(', ') : String(a)) + '\n\n';
    });
  });
  return txt;
}

function renderSummary() {
  document.getElementById('pwrap').style.display = 'none';
  var secs = [];
  Q.forEach(function(q) { if (secs.indexOf(q.s) === -1) secs.push(q.s); });
  var html = '<div class="summary-title">Extração concluída</div>';
  html += '<div class="summary-sub">Resumo completo de todas as respostas da sessão.</div>';
  secs.forEach(function(sec) {
    var items = [];
    Q.forEach(function(q, i) { if (q.s === sec && ans[i] !== null && ans[i] !== undefined) items.push({q:q, i:i}); });
    if (!items.length) return;
    html += '<div class="summary-section"><div class="summary-sec-title">' + sec + '</div>';
    items.forEach(function(item) {
      var a = ans[item.i];
      var aStr = Array.isArray(a) ? a.join(' · ') : String(a);
      html += '<div class="summary-item"><div class="summary-q">' + item.q.q + '</div><div class="summary-a">' + aStr + '</div></div>';
    });
    html += '</div>';
  });
  html += '<div class="send-box">';
  html += '<div class="send-box-title">Enviar respostas por email</div>';
  html += '<div class="send-box-sub">Digite o email que vai receber as respostas da extração.</div>';
  html += '<input type="email" class="email-input" id="email-dest" placeholder="seu@email.com">';
  html += '<div class="action-row">';
  html += '<button class="btn-send" id="bsend">Enviar por email</button>';
  html += '<button class="btn-copy" id="bcp">Copiar tudo</button>';
  html += '<button class="btn-restart" id="brs">Nova sessão</button>';
  html += '</div>';
  html += '<div class="status-msg" id="estatus"></div>';
  html += '</div>';
  document.getElementById('card').innerHTML = html;

  document.getElementById('bsend').addEventListener('click', function() {
    var email = document.getElementById('email-dest').value.trim();
    var status = document.getElementById('estatus');
    if (!email || email.indexOf('@') === -1) {
      status.style.color = '#c0392b';
      status.textContent = 'Por favor insira um email válido.';
      return;
    }
    var btn = document.getElementById('bsend');
    btn.textContent = 'Enviando...';
    btn.disabled = true;
    status.textContent = '';
    var body = buildText();
    fetch('https://formspree.io/f/mvzwwwdz', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
      body: JSON.stringify({ email: email, message: body })
    }).then(function(res) { return res.json().then(function(data) { return {ok: res.ok, data: data}; }); })
    .then(function(r) {
      if (r.ok) {
        status.style.color = '#0F6E56';
        status.textContent = 'Email enviado com sucesso!';
        btn.textContent = 'Enviado!';
      } else {
        throw new Error(r.data.error || 'Erro ao enviar');
      }
    }).catch(function(err) {
      status.style.color = '#c0392b';
      status.textContent = 'Erro: ' + err.message;
      btn.textContent = 'Enviar por email';
      btn.disabled = false;
    });
  });

  document.getElementById('bcp').addEventListener('click', function() {
    navigator.clipboard.writeText(buildText()).then(function() {
      var b = document.getElementById('bcp');
      b.textContent = 'Copiado!';
      setTimeout(function() { b.textContent = 'Copiar tudo'; }, 2000);
    });
  });

  document.getElementById('brs').addEventListener('click', function() {
    ans = new Array(Q.length).fill(null);
    tagData = {};
    cur = 0;
    document.getElementById('pwrap').style.display = '';
    render();
  });
}

render();
</script>
</body>
</html>
